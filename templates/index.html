<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JTalk - AI Voice Assistant</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>
#chat-container { scroll-behavior: smooth; }
</style>
</head>

<body class="bg-gradient-to-br from-indigo-300 via-blue-100 to-purple-300 min-h-screen flex flex-col">

<header class="bg-gradient-to-r from-blue-700 to-indigo-700 text-white p-4 text-center">
    <h1 class="text-3xl font-bold">🎙️ JTalk AI Assistant</h1>
</header>

<div class="flex flex-1 flex-col lg:flex-row p-4 gap-4">

<!-- FEATURES -->
<div class="lg:w-1/3 bg-white/70 rounded-3xl p-5">
    <h2 class="font-bold text-lg mb-2">🚀 Features</h2>
    <ul class="text-sm space-y-2">
        <li>🤖 ML Based Chatbot</li>
        <li>🎤 Voice Assistant</li>
        <li>🗣️ Speech to Text</li>
        <li>🔊 Text to Speech</li>
    </ul>
</div>

<!-- CHAT -->
<div class="flex-1 max-w-md mx-auto bg-white/70 rounded-3xl flex flex-col">

    <div id="chat-container" class="flex-1 p-4 overflow-y-auto">
        <p class="text-gray-500 text-center">Start chatting...</p>
    </div>

    <div class="p-3 flex gap-2">
        <input id="message-input" class="flex-1 border rounded-full px-4 py-2" placeholder="Type message">

        <button id="send-btn" class="bg-blue-500 text-white px-4 rounded-full">➤</button>

        <button id="record-btn" class="bg-green-500 text-white px-4 rounded-full">🎤</button>
    </div>

</div>
</div>

<script>
    

    document.addEventListener("DOMContentLoaded", () => {

    const chatContainer = document.getElementById("chat-container");
    const messageInput = document.getElementById("message-input");
    const sendBtn = document.getElementById("send-btn");
    const recordBtn = document.getElementById("record-btn");

    let mediaRecorder;
    let audioChunks = [];
    let microphoneStream = null;
    let isRecording = false;
    let recordStartTime = 0;

    // ---------- MIC ----------
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
        microphoneStream = stream;
    })
    .catch(() => alert("Allow mic permission"));

    // ---------- CHAT UI ----------
    function addMessage(msg, sender, type = "text") {

        const wrapper = document.createElement("div");
        wrapper.className = `flex ${sender === "You" ? "justify-end" : "justify-start"}`;

        const bubble = document.createElement("div");

        bubble.className = `
            px-4 py-2 max-w-[70%] rounded-2xl text-sm shadow-md
            ${sender === "You"
                ? "bg-blue-500 text-white rounded-br-none"
                : "bg-gray-200 text-black rounded-bl-none"}
        `;

        if (type === "text") {
            bubble.innerText = msg;
        }

        if (type === "audio") {
            bubble.innerHTML = "🎤 Voice Message";
        }

        wrapper.appendChild(bubble);
        chatContainer.appendChild(wrapper);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // ---------- SEND TEXT (FIXED) ----------
    sendBtn.onclick = () => {
        const msg = messageInput.value.trim();
        if (!msg) return;

        addMessage(msg, "You", "text"); // ✅ show in UI
        messageInput.value = "";

        sendMessage("text", msg);
    };

    // ---------- RECORD ----------
    recordBtn.onclick = () => {

        if (!microphoneStream) return alert("Mic not ready");

        if (!isRecording) {

            isRecording = true;
            recordStartTime = Date.now();
            audioChunks = [];

            mediaRecorder = new MediaRecorder(microphoneStream, {
                mimeType: 'audio/webm;codecs=opus'
            });

            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {

                const duration = (Date.now() - recordStartTime) / 1000;

                if (duration < 1.5) {
                    alert("Speak longer");
                    return;
                }

                const blob = new Blob(audioChunks, { type: 'audio/webm' });

                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];

                    addMessage("Voice message sent", "You", "audio"); // ✅ SHOW VOICE

                    sendMessage("audio", base64);
                };

                reader.readAsDataURL(blob);
            };

            mediaRecorder.start();
            recordBtn.textContent = "🛑";

        } else {

            isRecording = false;
            setTimeout(() => mediaRecorder.stop(), 300);
            recordBtn.textContent = "🎤";
        }
    };

    // ---------- API ----------
    function sendMessage(type, message) {

        axios.post("/chat", {
            input_type: type,
            message: message
        })
        .then(res => {

            addMessage(res.data.response, "Bot", "text"); // ✅ show bot reply

            if (res.data.audio_response) {
                const audio = new Audio(`data:audio/wav;base64,${res.data.audio_response}`);
                audio.play().catch(() => console.log("Audio blocked"));
            }
        })
        .catch(() => addMessage("Error", "Bot"));
    }

});
</script>

</body>
</html>
